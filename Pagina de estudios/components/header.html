<header class="header">
    <div class="header-left">
        <a href="#" class="logo" id="logoLink">
            <span class="logo-icon"><i class="fas fa-graduation-cap"></i></span>
            <span class="logo-text">
                <span>Estudio</span>
                <span>• hub</span>
            </span>
        </a>
        <nav class="nav-menu">
